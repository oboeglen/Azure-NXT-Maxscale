        ipv4_address: 172.50.0.14

  # ===========================================================================
  # Collabora Online (CODE) — Édition collaborative de documents (3 nœuds)
  # ===========================================================================
  collabora-node1:
    image: collabora/code:latest
    container_name: collabora-node1
    restart: always
    expose:
      - "9980"
    environment:
      - dictionaries=fr_FR en_US
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.listen=any --o:server_name=${COLLABORA_DOMAIN}
      - DONT_GEN_SSL_CERT=true
      - aliasgroup1=https://${NEXTCLOUD_DOMAIN}:443
    cap_add:
      - MKNOD
      - SYS_ADMIN
    networks:
      - collabora-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9980/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  collabora-node2:
    image: collabora/code:latest
    container_name: collabora-node2
    restart: always
    expose:
      - "9980"
    environment:
      - dictionaries=fr_FR en_US
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.listen=any --o:server_name=${COLLABORA_DOMAIN}
      - DONT_GEN_SSL_CERT=true
      - aliasgroup1=https://${NEXTCLOUD_DOMAIN}:443
    cap_add:
      - MKNOD
      - SYS_ADMIN
    networks:
      - collabora-net

  collabora-node3:
    image: collabora/code:latest
    container_name: collabora-node3
    restart: always
    expose:
      - "9980"
    environment:
      - dictionaries=fr_FR en_US
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.listen=any --o:server_name=${COLLABORA_DOMAIN}
      - DONT_GEN_SSL_CERT=true
      - aliasgroup1=https://${NEXTCLOUD_DOMAIN}:443
    cap_add:
      - MKNOD
      - SYS_ADMIN
    networks:
      - collabora-net

  # ===========================================================================
  # Whiteboard — Tableau blanc collaboratif (2 nœuds + Redis dédié)
  # État partagé entre nœuds via Redis Streams (image :stable requise)
  # ===========================================================================
  whiteboard-node1:
    image: ghcr.io/nextcloud-releases/whiteboard:stable
    container_name: whiteboard-node1
    restart: always
    expose:
      - "3002"
    environment:
      - NEXTCLOUD_URL=https://${NEXTCLOUD_DOMAIN}
      - JWT_SECRET_KEY=${WHITEBOARD_JWT_SECRET}
      - STORAGE_STRATEGY=redis
      - REDIS_URL=redis://:${REDIS_WHITEBOARD_PASSWORD}@redis-whiteboard:6379/0
    networks:
      - whiteboard-net
    depends_on:
      redis-whiteboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo '' | nc -w1 127.0.0.1 3002 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  whiteboard-node2:
    image: ghcr.io/nextcloud-releases/whiteboard:stable
    container_name: whiteboard-node2
    restart: always
    expose:
      - "3002"
    environment:
      - NEXTCLOUD_URL=https://${NEXTCLOUD_DOMAIN}
      - JWT_SECRET_KEY=${WHITEBOARD_JWT_SECRET}
      - STORAGE_STRATEGY=redis
      - REDIS_URL=redis://:${REDIS_WHITEBOARD_PASSWORD}@redis-whiteboard:6379/0
    networks:
      - whiteboard-net
    depends_on:
      redis-whiteboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo '' | nc -w1 127.0.0.1 3002 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-whiteboard:
    image: redis:7.4-alpine
    container_name: redis-whiteboard
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_WHITEBOARD_PASSWORD}
      --appendonly yes
      --bind 0.0.0.0
    volumes:
      - redis_whiteboard_data:/data
    environment:
      - REDIS_WHITEBOARD_PASSWORD=${REDIS_WHITEBOARD_PASSWORD}
    networks:
      - whiteboard-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_WHITEBOARD_PASSWORD --no-auth-warning ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Réseaux — Isolation par service, HAProxy sur tous les réseaux
# =============================================================================
networks:
  next-net:
    name: next-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.10.0.0/24

  galera-net:
    name: galera-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

  storage-net:
    name: storage-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  collabora-net:
    name: collabora-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.40.0.0/24

  whiteboard-net:
    name: whiteboard-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.100.0.0/24

  rustfsnet:
    name: rustfsnet
    driver: bridge
    ipam:
      config:
        - subnet: 172.50.0.0/24

