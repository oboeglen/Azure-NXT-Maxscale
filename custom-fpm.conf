; Custom PHP-FPM pool settings — mounted into app-next containers
; Overrides the default pm.max_children=5 which is too low for concurrent
; whiteboard saves (whiteboard sends 4-5 concurrent PUT requests simultaneously)
[www]
pm = dynamic
pm.max_children = 15
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
